server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https: data:; connect-src 'self' https:; object-src 'none';" always;

    # React Router — serve index.html for all non-file paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets indefinitely
    location ~* \.(js|css|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Block hidden files (e.g. .env, .git)
    location ~ /\. {
        deny all;
    }
}
